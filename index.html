<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighter Jet Shooter - Boss Edition</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            font-family: Arial;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            background: #000;
        }
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font: bold 18px 'Courier New';
            z-index: 100;
            text-shadow: 2px 2px 4px #000;
        }
        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FF0000;
            font: bold 40px Arial;
            text-align: center;
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">Time: 0s | Score: 0 | HP: 100</div>
    <div id="gameOver">GAME OVER<br><span style="font-size:20px">Tap to Restart</span></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// === GAME VARIABLES ===
let player = { x: canvas.width/2, y: canvas.height-100, width: 50, height: 50, hp: 100 };
let bullets = [];
let enemies = [];
let stars = [];
let boss = null;
let score = 0;
let gameTime = 0;
let bossSpawnTime = 10;
let bossActive = false;
let gameRunning = true;

// === SPACE STARS BANADO ===
for(let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 1,
        speed: Math.random() * 3 + 1
    });
}

// === CONTROLS ===
let keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    let touch = e.touches[0];
    player.x = touch.clientX - player.width/2;
    player.y = touch.clientY - player.height/2;
});
canvas.addEventListener('click', shoot);
document.addEventListener('click', () => { if(!gameRunning) restart(); });

function shoot() {
    if(!gameRunning) return;
    bullets.push({ x: player.x + player.width/2 - 2, y: player.y, width: 4, height: 15, speed: 10 });
}

// === SPAWN ENEMIES ===
setInterval(() => {
    if(gameRunning &&!bossActive) {
        enemies.push({ 
            x: Math.random() * (canvas.width-40), 
            y: -40, 
            width: 40, 
            height: 40, 
            speed: 2 + gameTime/20 
        });
    }
}, 1000);

// === GAME LOOP ===
function update() {
    if(!gameRunning) return;
    
    // TIME + DIFFICULTY
    gameTime += 1/60;
    
    // PLAYER MOVE
    if(keys['ArrowLeft'] && player.x > 0) player.x -= 7;
    if(keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += 7;
    if(keys['ArrowUp'] && player.y > 0) player.y -= 7;
    if(keys['ArrowDown'] && player.y < canvas.height - player.height) player.y += 7;
    if(keys[' ']) { shoot(); keys[' '] = false; }
    
    // SPACE STARS MOVE
    stars.forEach(star => {
        star.y += star.speed;
        if(star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
    });
    
    // BULLETS MOVE
    bullets.forEach((b, i) => {
        b.y -= b.speed;
        if(b.y < 0) bullets.splice(i, 1);
    });
    
    // ENEMIES MOVE
    enemies.forEach((e, i) => {
        e.y += e.speed;
        if(e.y > canvas.height) enemies.splice(i, 1);
        
        // PLAYER HIT
        if(player.x < e.x + e.width && player.x + player.width > e.x &&
           player.y < e.y + e.height && player.y + player.height > e.y) {
            enemies.splice(i, 1);
            player.hp -= 20;
            if(player.hp <= 0) gameOver();
        }
        
        // BULLET HIT ENEMY
        bullets.forEach((b, j) => {
            if(b.x < e.x + e.width && b.x + b.width > e.x &&
               b.y < e.y + e.height && b.y + b.height > e.y) {
                bullets.splice(j, 1);
                enemies.splice(i, 1);
                score += 10;
            }
        });
    });
    
    // === BIG BOSS SYSTEM ===
    if(gameTime > bossSpawnTime &&!bossActive) {
        bossActive = true;
        boss = { x: canvas.width/2-100, y: -200, width: 200, height: 200, hp: 100, speed: 1.5 };
    }
    
    if(bossActive && boss) {
        boss.y += boss.speed;
        if(boss.y > 80) boss.speed = -1.5;
        if(boss.y < 20) boss.speed = 1.5;
        if(gameTime > 30) boss.speed = boss.speed > 0? 3 : -3; // 30s baad tez
        
        // BOSS HIT PLAYER
        if(player.x < boss.x + boss.width && player.x + player.width > boss.x &&
           player.y < boss.y + boss.height && player.y + player.height > boss.y) {
            gameOver();
        }
        
        // BULLET HIT BOSS
        bullets.forEach((b, i) => {
            if(b.x < boss.x + boss.width && b.x + b.width > boss.x &&
               b.y < boss.y + boss.height && b.y + b.height > boss.y) {
                bullets.splice(i, 1);
                boss.hp -= 5;
                if(boss.hp <= 0) {
                    bossActive = false;
                    boss = null;
                    score += 500;
                    bossSpawnTime = gameTime + 15;
                }
            }
        });
    }
    
    // UPDATE UI
    document.getElementById('ui').innerHTML = 
        `Time: ${Math.floor(gameTime)}s | Score: ${score} | HP: ${player.hp}`;
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // DRAW STARS
    ctx.fillStyle = '#FFF';
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));
    
    // DRAW PLAYER
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    // DRAW BULLETS
    ctx.fillStyle = '#FFFF00';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
    
    // DRAW ENEMIES
    ctx.fillStyle = '#FF00FF';
    enemies.forEach(e => ctx.fillRect(e.x, e.y, e.width, e.height));
    
    // DRAW BIG BOSS
    if(bossActive && boss) {
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
        // BOSS HP BAR
        ctx.fillStyle = '#000';
        ctx.fillRect(boss.x, boss.y-15, boss.width, 10);
        ctx.fillStyle = '#00FF00';
        ctx.fillRect(boss.x, boss.y-15, (boss.hp/100)*boss.width, 10);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 24px Arial';
        ctx.fillText('BOSS', boss.x + 70, boss.y + 110);
    }
}

function gameOver() {
    gameRunning = false;
    document.getElementById('gameOver').style.display = 'block';
}

function restart() {
    player = { x: canvas.width/2, y: canvas.height-100, width: 50, height: 50, hp: 100 };
    bullets = []; enemies = []; boss = null; bossActive = false;
    score = 0; gameTime = 0; bossSpawnTime = 10; gameRunning = true;
    document.getElementById('gameOver').style.display = 'none';
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
