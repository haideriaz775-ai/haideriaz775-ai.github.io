<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fighter Jet Shooter - Haider Games</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            font-family: Arial;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #0a0e27 0%, #1a237e 100%);
        }
        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font: bold 18px 'Courier New';
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        #bossInfo {
            position: fixed;
            top: 45px;
            left: 10px;
            color: #ff0000;
            font: bold 20px Arial;
            text-shadow: 2px 2px 4px #000;
            display: none;
            z-index: 10;
        }
        #bossBar {
            position: fixed;
            top: 75px;
            left: 10px;
            width: 280px;
            height: 28px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #ff0000;
            border-radius: 8px;
            display: none;
            z-index: 10;
        }
        #bossHp {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6b00);
            width: 100%;
            border-radius: 5px;
        }
        #controls {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        #shootBtn {
            padding: 25px 50px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff0000, #ff6b00);
            color: white;
            border: 3px solid #fff;
            border-radius: 60px;
            box-shadow: 0 8px 20px rgba(255,0,0,0.5);
        }
        #shootBtn:active {
            transform: scale(0.95);
        }
        #gameOver {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: white; padding: 40px;
            border: 3px solid #ff0000;
            border-radius: 20px; text-align: center;
            display: none; z-index: 20;
        }
        #restartBtn {
            padding: 18px 40px; font-size: 20px;
            background: #00ff00; color: #000;
            border: none; border-radius: 10px; margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        SCORE: <span id="score">0</span> |
        AMMO: <span id="ammo">50</span> |
        LEVEL: <span id="level">1</span> |
        KILLS: <span id="kills">0</span>
    </div>
    <div id="bossInfo">⚠️ BOSS LEVEL <span id="bossLevel">1</span> ⚠️</div>
    <div id="bossBar"><div id="bossHp"></div></div>
    <div id="controls"><button id="shootBtn">🔥 FIRE 🔥</button></div>
    <div id="gameOver">
        <h2>MISSION FAILED</h2>
        <p style="font-size: 24px; margin: 15px 0;">Final Score: <span id="finalScore">0</span></p>
        <p>Monsters Killed: <span id="finalKills">0</span></p>
        <p>Max Level: <span id="finalLevel">1</span></p>
        <button id="restartBtn">RESTART MISSION</button>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0, ammo = 50, level = 1, kills = 0, gameRunning = true;
let player = { x: canvas.width/2, y: canvas.height-120, size: 30 };
let bullets = [], enemies = [], particles = [], boss = null;

document.getElementById('shootBtn').onclick = shoot;
document.getElementById('restartBtn').onclick = startGame;
canvas.onclick = shoot;

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    let touch = e.touches[0];
    player.x = Math.max(40, Math.min(canvas.width-40, touch.clientX));
});

function startGame() {
    score = 0; ammo = 50; level = 1; kills = 0; gameRunning = true;
    bullets = []; enemies = []; particles = []; boss = null;
    player.x = canvas.width/2;
    document.getElementById('gameOver').style.display = 'none';
    document.getElementById('bossBar').style.display = 'none';
    document.getElementById('bossInfo').style.display = 'none';
    updateUI();
    gameLoop();
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('ammo').textContent = ammo;
    document.getElementById('level').textContent = level;
    document.getElementById('kills').textContent = kills;
}

function shoot() {
    if (!gameRunning || ammo <= 0) return;
    ammo--;
    // Long range bullets - zyada speed
    bullets.push({
        x: player.x,
        y: player.y-40,
        speed: 18,
        size: 6,
        damage: 1
    });
    updateUI();
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random()-0.5)*8,
            vy: (Math.random()-0.5)*8,
            size: Math.random()*4+2,
            color: color,
            life: 30
        });
    }
}

function spawnEnemy() {
    enemies.push({
        x: Math.random() * (canvas.width-60) + 30,
        y: -50,
        size: 25 + Math.random() * 20,
        speed: 1.5 + level * 0.4,
        hp: 1 + Math.floor(level/3),
        type: 'monster'
    });
}

function spawnBoss() {
    let bossLevel = Math.floor(level / 5);
    boss = {
        x: canvas.width/2,
        y: 150,
        size: 70 + bossLevel * 15,
        speed: 1 + bossLevel * 0.3,
        hp: 25 + bossLevel * 20,
        maxHp: 25 + bossLevel * 20,
        dir: 1,
        level: bossLevel,
        shootTimer: 0
    };
    document.getElementById('bossLevel').textContent = bossLevel;
    document.getElementById('bossBar').style.display = 'block';
    document.getElementById('bossInfo').style.display = 'block';
}

function drawFighterJet() {
    // Fighter Jet body
    ctx.fillStyle = '#4a90e2';
    ctx.beginPath();
    ctx.moveTo(player.x, player.y-35);
    ctx.lineTo(player.x-15, player.y);
    ctx.lineTo(player.x-25, player.y+10);
    ctx.lineTo(player.x-10, player.y+5);
    ctx.lineTo(player.x, player.y+15);
    ctx.lineTo(player.x+10, player.y+5);
    ctx.lineTo(player.x+25, player.y+10);
    ctx.lineTo(player.x+15, player.y);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#1e3a8a';
    ctx.beginPath();
    ctx.ellipse(player.x, player.y-15, 8, 12, 0, 0, 7);
    ctx.fill();

    // Wings detail
    ctx.fillStyle = '#2563eb';
    ctx.fillRect(player.x-30, player.y-5, 20, 8);
    ctx.fillRect(player.x+10, player.y-5, 20, 8);

    // Engine flames
    ctx.fillStyle = '#ff6b00';
    ctx.beginPath();
    ctx.moveTo(player.x-8, player.y+15);
    ctx.lineTo(player.x-5, player.y+25+Math.random()*5);
    ctx.lineTo(player.x, player.y+15);
    ctx.lineTo(player.x+5, player.y+25+Math.random()*5);
    ctx.lineTo(player.x+8, player.y+15);
    ctx.fill();
}

function drawMonster(enemy) {
    // Monster body
    ctx.fillStyle = '#8b00ff';
    ctx.beginPath();
    ctx.arc(enemy.x, enemy.y, enemy.size, 0, 7);
    ctx.fill();

    // Spikes
    ctx.fillStyle = '#4b0082';
    for(let i=0; i<8; i++) {
        let angle = (i/8) * Math.PI * 2;
        let sx = enemy.x + Math.cos(angle) * enemy.size;
        let sy = enemy.y + Math.sin(angle) * enemy.size;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + Math.cos(angle) * 10, sy + Math.sin(angle) * 10);
        ctx.lineTo(sx + Math.cos(angle+0.5) * 5, sy + Math.sin(angle+0.5) * 5);
        ctx.fill();
    }

    // Eyes
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(enemy.x-8, enemy.y-5, 5, 0, 7);
    ctx.arc(enemy.x+8, enemy.y-5, 5, 0, 7);
    ctx.fill();
}

function gameLoop() {
    if (!gameRunning) return;

    // Sky gradient
    let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#0a0e27');
    gradient.addColorStop(1, '#1a237e');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for(let i=0; i<30; i++){
        let x = (i * 123) % canvas.width;
        let y = (i * 456) % canvas.height;
        ctx.beginPath();
        ctx.arc(x, y, 30, 0, 7);
        ctx.fill();
    }

    // Draw Fighter Jet
    drawFighterJet();

    // Particles - explosion effects
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 30;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, 7);
        ctx.fill();
        ctx.globalAlpha = 1;
        return p.life > 0;
    });

    // Bullets - Long range
    bullets = bullets.filter(b => {
        b.y -= b.speed;
        ctx.fillStyle = '#ffff00';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffff00';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, 7);
        ctx.fill();
        ctx.shadowBlur = 0;
        return b.y > -20;
    });

    // Boss
    if (boss) {
        boss.x += boss.speed * boss.dir;
        if (boss.x > canvas.width - boss.size || boss.x < boss.size) boss.dir *= -1;

        // Draw boss monster
        ctx.fillStyle = '#ff0000';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0000';
        ctx.beginPath();
        ctx.arc(boss.x, boss.y, boss.size, 0, 7);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Boss eyes
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.arc(boss.x-20, boss.y-15, 12, 0, 7);
        ctx.arc(boss.x+20, boss.y-15, 12, 0, 7);
        ctx.fill();

        // Boss mouth
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(boss.x, boss.y+10, 20, 0, Math.PI);
        ctx.stroke();

        // Boss HP
        let hpPercent = (boss.hp / boss.maxHp) * 100;
        document.getElementById('bossHp').style.width = hpPercent + '%';

        // Bullets hit boss - BOSS BREAK HOTA HAI
        bullets = bullets.filter(bullet => {
            let dist = Math.hypot(bullet.x - boss.x, bullet.y - boss.y);
            if (dist < boss.size + bullet.size) {
                boss.hp -= bullet.damage;
                createExplosion(bullet.x, bullet.y, '#ff6b00');
                if (boss.hp <= 0) {
                    score += 500 + boss.level * 300;
                    level++;
                    ammo += 30 + boss.level * 15;
                    kills++;
                    createExplosion(boss.x, boss.y, '#ff0000');
                    boss = null;
                    document.getElementById('bossBar').style.display = 'none';
                    document.getElementById('bossInfo').style.display = 'none';
                    updateUI();
                }
                return false;
            }
            return true;
        });

        if (boss && Math.hypot(boss.x - player.x, boss.y - player.y) < boss.size + player.size) {
            endGame();
        }

    } else {
        // Normal monsters
        enemies = enemies.filter(enemy => {
            enemy.y += enemy.speed;
            drawMonster(enemy);

            if (enemy.y > canvas.height) {
                endGame();
                return false;
            }

            // BULLETS HIT MONSTER - AB BREAK HONGE
            bullets = bullets.filter(bullet => {
                let dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                if (dist < enemy.size + bullet.size) {
                    enemy.hp -= bullet.damage;
                    createExplosion(bullet.x, bullet.y, '#ff00ff');

                    if (enemy.hp <= 0) {
                        score += 20 + level * 5;
                        kills++;
                        createExplosion(enemy.x, enemy.y, '#8b00ff');

                        // Level up har 10 kills par
                        if(kills % 10 === 0) {
                            level++;
                            ammo += 20;
                            if(level % 5 === 0) spawnBoss();
                        }
                        updateUI();
                        return false; // Enemy destroyed
                    }
                    return false; // Bullet destroyed
                }
                return true;
            });

            return enemy.hp > 0;
        });

        // Spawn rate
        if (Math.random() < 0.03 + level * 0.008) spawnEnemy();
    }

    // Auto reload
    if (ammo === 0) {
        ammo = 50;
        updateUI();
    }

    requestAnimationFrame(gameLoop);
}

function endGame() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalKills').textContent = kills;
    document.getElementById('finalLevel').textContent = level;
    document.getElementById('gameOver').style.display = 'block';
}

startGame();
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    player.y = canvas.height - 120;
});
</script>
</body>
</html>
